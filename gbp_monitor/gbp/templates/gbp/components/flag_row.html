{% comment %}
Component: flag_row.html
Usage: {% include "gbp/components/flag_row.html" with label="Has VOM" value=snapshot.has_vom danger=False %}
{% endcomment %}
<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
  <span class="text-sm text-slate-600">{{ label }}</span>
  {% if value %}
    {% if danger %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-800">
      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
      Ya
    </span>
    {% else %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800">
      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
      Ya
    </span>
    {% endif %}
  {% else %}
    <span class="text-xs text-slate-300 font-medium">Tidak</span>
  {% endif %}
</div>
